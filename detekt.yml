comments:
  severity: warning
  EndOfSentenceFormat:
    active: false
  DocumentationOverPrivateFunction:
    active: false

complexity:
  LongParameterList:
    active: true
    allowedFunctionParameters: 10
  TooManyFunctions:
    allowedFunctionsPerInterface: 20
    allowedFunctionsPerClass: 15
    allowedFunctionsPerFile: 15
  ComplexInterface:
    allowedDefinitions: 20

naming:
  FunctionNameMaxLength:
    maximumFunctionNameLength: 35

style:
  MagicNumber:
    ignoreEnums: true
  MaxLineLength:
    maxLineLength: 200
  ReturnCount:
    active: false
  UseIfInsteadOfWhen:
    active: false
